<?xml version="1.0" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- UlarBox U mark (reused from icon-icns) -->
    <mask id="u-mask">
      <circle cx="50" cy="50" r="40" fill="white"/>
      <rect x="0" y="0" width="100" height="45" fill="black"/>
      <rect x="40" y="40" width="20" height="10" fill="black"/>
      <circle cx="50" cy="50" r="10" fill="black"/>
    </mask>
    <symbol id="ulogo" viewBox="0 0 100 100">
      <g fill="#3985F7">
        <rect x="10" y="15" width="30" height="10" rx="5" ry="5"/>
        <rect x="60" y="15" width="30" height="10" rx="5" ry="5"/>
        <rect x="10" y="30" width="30" height="25" rx="5" ry="5"/>
        <rect x="60" y="30" width="30" height="25" rx="5" ry="5"/>
        <circle cx="50" cy="50" r="40" mask="url(#u-mask)"/>
      </g>
    </symbol>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
    <!-- cone (tail): baseL -> T(89,89) -> baseR ; T = bottom-right corner of badge square -->
    <path id="cone" d="M 69.5 83.77 L 89 89 L 83.77 69.5 Z"/>
  </defs>

  <!-- Layer 1: white halo (외곽선) with shadow -->
  <g filter="url(#shadow)">
    <use href="#cone" fill="#ffffff" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="50" cy="50" r="39" fill="none" stroke="#ffffff" stroke-width="13"/>
  </g>

  <!-- Layer 2: blue cone, white interior, blue ring -->
  <use href="#cone" fill="#3985F7"/>
  <circle cx="50" cy="50" r="39" fill="#ffffff"/>
  <circle cx="50" cy="50" r="39" fill="none" stroke="#3985F7" stroke-width="7"/>

  <!-- Layer 3: U mark (badge content, in fill color) centered on circle -->
  <use href="#ulogo" x="24.00" y="26.70" width="52" height="52"/>
</svg>
